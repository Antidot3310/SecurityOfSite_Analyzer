<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scanner</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div class="wrap">
    <header>
      <p class="muted">
        Простой интерфейс: <strong>Парсить</strong> — получить формы, <strong>Сканировать</strong> — запустить полезные
        нагрузки.
      </p>
    </header>

    <section class="controls">
      <input id="urlInput" type="text" placeholder="Введите URL..." />
      <button id="btnParse">Парсить</button>
      <button id="btnScan">Сканировать</button>
    </section>

    <div id="status" class="hidden">Выполняется...</div>

    <section id="resultArea" class="result-columns hidden" aria-hidden="true">
      <div class="left">
        <h3>Результаты</h3>
        <div id="summary" class="summary-line"></div>

        <div class="table-wrap">
          <table id="resultsTable" aria-label="Результаты сканирования">
            <thead>
              <tr>
                <th>#</th>
                <th>Полезная нагрузка</th>
                <th>Доказательство</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="right">
        <h3>Сырые данные (JSON)</h3>
        <pre id="rawJson" class="json" aria-live="polite"></pre>
        <div class="clear-wrap">
          <button id="btnClear">Очистить</button>
        </div>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
